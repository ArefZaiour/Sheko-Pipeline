[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "perf-marketing-pipelines"
version = "0.1.0"
description = "Campaign data ingestion and reporting pipelines"
requires-python = ">=3.11"
dependencies = [
    "google-ads>=23.0.0",
    "facebook-business>=19.0.0",
    "psycopg[binary]>=3.1",
    "pandas>=2.0",
    "pydantic>=2.0",
    "httpx>=0.27",
    "tenacity>=8.0",
    "python-dotenv>=1.0",
    "structlog>=24.0",
    "slack-sdk>=3.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "black>=24.0",
    "mypy>=1.10",
]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP", "B"]

[tool.black]
line-length = 100

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
