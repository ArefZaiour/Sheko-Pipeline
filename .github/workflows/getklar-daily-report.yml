name: SHEKO Daily Spend Report

on:
  schedule:
    # 7:00 UTC = 9:00 CEST (summer) / 8:00 CET (winter)
    # Using 6:57 to avoid the :00 congestion on GitHub Actions
    - cron: '57 6 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: packages/pipelines/pyproject.toml

      - name: Install dependencies
        run: |
          cd packages/pipelines
          pip install -e ".[dev]"

      - name: Run daily report
        env:
          GETKLAR_API_TOKEN: ${{ secrets.GETKLAR_API_TOKEN }}
          GETKLAR_TEMPLATE_URL: ${{ secrets.GETKLAR_TEMPLATE_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          cd packages/pipelines
          PYTHONPATH=src python -m loaders.getklar_daily_report
